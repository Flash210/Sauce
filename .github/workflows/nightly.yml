name: 🌙 Nightly — Playwright Tests

on:
  schedule:
    # Runs every night at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  nightly:
    name: 🌙 Nightly Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🌙 Run Full Nightly Test Suite (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true

      - name: 📊 Upload Nightly HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 60

      - name: 📸 Upload Nightly Test Results (Screenshots & Videos)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 60

      - name: 🔔 Notify on Nightly Failure
        if: failure()
        run: |
          echo "::error::🌙 Nightly tests FAILED on ${{ matrix.browser }}. Check the artifacts for screenshots and videos."
